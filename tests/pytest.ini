[pytest]
# Directorios de tests
testpaths = tests

# Patrón para encontrar archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Plugins activos
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=services
    --cov=app
    --cov-report=term-missing
    --cov-report=html:tests/coverage_html

# Marcadores personalizados
markers =
    unit: Tests unitarios rápidos (sin dependencias externas)
    integration: Tests de integración (requieren DB, servicios, etc.)
    slow: Tests lentos (LLM, embeddings, etc.)

# Ignorar warnings de deprecación de librerías externas
filterwarnings =
    ignore::DeprecationWarning:werkzeug.*
    ignore::DeprecationWarning:flask.*
