{% extends "base.html" %}

{% block content_public %}
<div style="display: flex; background: #fff; border-radius: 14px; box-shadow: 0 4px 32px rgba(0,0,0,0.10); overflow: hidden; width: 100%; max-width: 820px; min-height: 480px;">

    <!-- PANEL IZQUIERDO: identidad visual -->
    <div style="flex: 1; background: #1d4ed8; padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; min-width: 0;">
        <div style="color: #bfdbfe; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.5rem;">Plataforma institucional</div>
        <h1 style="color: #fff; font-size: 2rem; font-weight: 800; margin: 0 0 0.5rem; line-height: 1.15;">EPIIS</h1>
        <p style="color: #93c5fd; font-size: 0.95rem; margin: 0 0 2rem; line-height: 1.6;">Gestión Documental con<br>Inteligencia Artificial</p>
        <div style="display: flex; flex-direction: column; gap: 0.6rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem; color: #bfdbfe; font-size: 0.83rem;">
                <i class="bi bi-search" style="font-size: 1rem;"></i> Consulta inteligente de documentos
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem; color: #bfdbfe; font-size: 0.83rem;">
                <i class="bi bi-files" style="font-size: 1rem;"></i> Repositorio documental centralizado
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem; color: #bfdbfe; font-size: 0.83rem;">
                <i class="bi bi-clock-history" style="font-size: 1rem;"></i> Trazabilidad de consultas
            </div>
        </div>
    </div>

    <!-- PANEL DERECHO: formulario -->
    <div style="width: 340px; flex-shrink: 0; padding: 2.5rem; display: flex; flex-direction: column; justify-content: center;">
        <h3 style="margin: 0 0 0.3rem; font-size: 1.25rem; font-weight: 700; color: #111827;">Iniciar sesión</h3>
        <p style="margin: 0 0 1.75rem; font-size: 0.85rem; color: #6b7280;">Accede con tu cuenta institucional</p>

        <form action="{{ url_for('login') }}" method="POST" style="display: flex; flex-direction: column; gap: 0;">

            <label for="username" style="font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.3rem; display: block;">
                Usuario
            </label>
            <input type="text" id="username" name="username"
                placeholder="Nombre de usuario"
                required autofocus
                style="margin-bottom: 1.1rem; border-radius: 7px; border: 1.5px solid #d1d5db; padding: 0.6rem 0.9rem; font-size: 0.9rem; width: 100%; outline: none; transition: border-color 0.15s;"
                onfocus="this.style.borderColor='#1d4ed8'" onblur="this.style.borderColor='#d1d5db'">

            <label for="password" style="font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.3rem; display: block;">
                Contraseña
            </label>
            <div style="position: relative; margin-bottom: 1.5rem;">
                <input type="password" id="password" name="password"
                    placeholder="Contraseña"
                    required
                    style="border-radius: 7px; border: 1.5px solid #d1d5db; padding: 0.6rem 2.6rem 0.6rem 0.9rem; font-size: 0.9rem; width: 100%; outline: none; transition: border-color 0.15s;"
                    onfocus="this.style.borderColor='#1d4ed8'" onblur="this.style.borderColor='#d1d5db'">
                <button type="button" id="toggle-eye" onclick="togglePassword()"
                    style="position: absolute; right: 2px; top: 2px; bottom: 2px; width: 40px; background: none; border: none; cursor: pointer; padding: 0; color: #9ca3af; display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: 0 6px 6px 0;">
                    <i class="bi bi-eye-slash" id="eye-icon" style="font-size: 1.1rem;"></i>
                </button>
            </div>

            <button type="submit"
                style="background: #1d4ed8; color: #fff; border: none; border-radius: 7px; padding: 0.65rem 1rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.4rem; transition: background 0.15s;"
                onmouseover="this.style.background='#1e40af'" onmouseout="this.style.background='#1d4ed8'">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar al sistema
            </button>
        </form>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye-slash';
    }
}
</script>
{% endblock %}
